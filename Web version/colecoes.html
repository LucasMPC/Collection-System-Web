<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Collection System Web - Minhas Coleções</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="layout-dashboard">
        <aside class="sidebar">
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 30px;">
                <div style="width: 80px; height: 80px; background-color: var(--cor-accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; font-size: 24px; margin-bottom: 10px; box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);">
                    SYS
                </div>
                <div class="logo" style="margin-bottom: 0;">COLLECTION <span>SYS</span></div>
            </div>
            
            <ul class="menu-nav">
                <li><a href="./dashboard.html">Início</a></li>
                <li class="ativo"><a href="./colecoes.html">Coleções</a></li>
                <li><a href="#">Configurações</a></li>
                <li><a href="./index.html" class="sair">SAIR</a></li>
            </ul>
        </aside>

        <main class="conteudo-principal">
            <div class="cabecalho-secao">
                <div>
                    <h2>Gerenciador de Coleções</h2>
                    <p style="color: var(--texto-mutado); margin-top: 5px;">Visualize e gerencie todos os seus repositórios de títulos catalogados.</p>
                </div>
                <button class="btn-form" style="width: auto; padding: 10px 20px;" onclick="controlarModal('abrir')">Nova Coleção</button>
            </div>

            <div class="grid-colecoes" id="lista-colecoes">
            </div>

            <p id="mensagem-vazia"
                style="display: none; color: var(--texto-mutado); margin-top: 20px;">
                Nenhuma coleção cadastrada.
            </p>
        </main>
    </div>

    <div class="modal" id="modal-colecao">
        <div class="conteudo-modal">
            <button class="fechar-modal" onclick="controlarModal('fechar')">&times;</button>
            <h3 style="margin-bottom: 25px;">Criar Nova Coleção</h3>
            <form id="form-colecao">
                <div class="grupo-input">
                    <label>Nome da Coleção</label>
                    <input
                        type="text"
                        id="nome-colecao"
                        required
                        placeholder="Ex: Coleção Retro Xbox">
                </div>
                <button type="submit" class="btn-form">Salvar Coleção</button>
            </form>
        </div>
    </div>

    <script>
        const usuarioId = localStorage.getItem('usuarioId');

        if (!usuarioId) {
            window.location.href = 'index.html';
        }

        const listaColecoes = document.getElementById('lista-colecoes');
        const mensagemVazia = document.getElementById('mensagem-vazia');

        carregarColecoes();

        async function carregarColecoes() {
            try {
                const resposta = await fetch(
                    `http://localhost:8080/api/colecoes/usuario/${usuarioId}`
                );

                const colecoes = await resposta.json();

                listaColecoes.innerHTML = '';

                if (colecoes.length === 0) {
                    mensagemVazia.style.display = 'block';
                    return;
                }

                mensagemVazia.style.display = 'none';

                colecoes.forEach(colecao => {
                    const card = document.createElement('div');

                    card.className = 'card-colecao';

                    card.innerHTML = `
                        <h4>${colecao.nome}</h4>
                        <p>Clique para visualizar</p>
                    `;

                    card.onclick = () => {

                        localStorage.setItem(
                            'colecaoSelecionada',
                            colecao.id
                        );

                        let historico = JSON.parse(
                            localStorage.getItem('colecoesRecentes')
                        ) || [];

                        historico = historico.filter(
                            item => item.id !== colecao.id
                        );

                        historico.unshift({
                            id: colecao.id,
                            nome: colecao.nome
                        });

                        historico = historico.slice(0, 2);

                        localStorage.setItem(
                            'colecoesRecentes',
                            JSON.stringify(historico)
                        );

                        window.location.href = './colecao-detalhes.html';
                    };

                    listaColecoes.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                alert('Erro ao carregar coleções.');
            }
        }

        document.getElementById('form-colecao')
            .addEventListener('submit', async function(event) {

            event.preventDefault();

            const nome = document.getElementById('nome-colecao').value;

            try {
                const resposta = await fetch(
                    `http://localhost:8080/api/colecoes/usuario/${usuarioId}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            nome: nome
                        })
                    }
                );

                const dados = await resposta.json();

                if (!resposta.ok) {
                    alert(dados.erro || 'Erro ao criar coleção.');
                    return;
                }

                document.getElementById('form-colecao').reset();

                controlarModal('fechar');

                carregarColecoes();

            } catch (error) {
                console.error(error);
                alert('Erro ao conectar com o servidor.');
            }
        });

        function controlarModal(acao) {
            const modal = document.getElementById('modal-colecao');

            if (acao === 'abrir') {
                modal.classList.add('aberto');
            } else {
                modal.classList.remove('aberto');
            }
        }
    </script>
</body>
</html>
