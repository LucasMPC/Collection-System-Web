<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <title>Collection System Web - Jogos</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="layout-dashboard">
        <aside class="sidebar">
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 30px;">
                <div style="width: 80px; height: 80px; background-color: var(--cor-accent); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #000; font-size: 24px; margin-bottom: 10px; box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);">
                    SYS
                </div>
                <div class="logo" style="margin-bottom: 0;">COLLECTION <span>SYS</span></div>
            </div>
            
            <ul class="menu-nav">
                <li><a href="./dashboard.html">Início</a></li>
                <li class="ativo"><a href="./colecoes.html">Coleções</a></li>
                <li><a href="#">Configurações</a></li>
                <li><a href="./index.html" class="sair">SAIR</a></li>
            </ul>
        </aside>

        <main class="conteudo-principal">
            <div class="cabecalho-secao">
                <div>
                    <a href="./dashboard.html" style="color: var(--cor-accent); text-decoration: none; font-size: 14px;"><- Voltar ao painel</a>
                    <h2 id="nome-colecao" style="margin-top: 5px;">Carregando...</h2>
                </div>
                <button
                    class="btn-form"
                    style="width: auto; padding: 10px 20px;"
                    onclick="controlarModalJogo('abrir')">
                    Adicionar Jogo
                </button>
            </div>

            <div class="barra-pesquisa-container">
                <input type="text" placeholder="Pesquisar por título do jogo..." oninput="filtrarTabela(this.value)">
            </div>

            <div class="container-tabela">
                <table class="tabela-jogos" id="tabela-jogos-id">
                    <thead>
                        <tr>
                            <th>Capa</th>
                            <th>Nome do Jogo</th>
                            <th>Data de Lançamento</th>
                            <th>Tipo de Mídia</th>
                            <th>Gênero</th>
                            <th>Desenvolvedora</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-jogos">
                    </tbody>
                </table>
                <p id="mensagem-sem-jogos"
                    style="display: none; color: var(--texto-mutado); margin-top: 20px;">
                    Nenhum jogo cadastrado nesta coleção.
                </p>
            </div>
        </main>
    </div>

    <div class="modal" id="modal-jogo">
        <div class="conteudo-modal">
            <button class="fechar-modal" onclick="controlarModalJogo('fechar')">&times;</button>
            <h3 style="margin-bottom: 25px;">Catalogar Novo Jogo</h3>
            <form id="form-jogo" onsubmit="salvarJogo(event)">
                <div class="grupo-input">
                    <label>Título do Jogo</label>
                    <input type="text" id="jogo-nome" required>
                </div>
                <div class="grupo-input">
                    <label>Data de Lançamento</label>
                    <input type="text"
                        id="jogo-data"
                        maxlength="10"
                        placeholder="DD/MM/AAAA"
                        oninput="aplicarMascaraData(this)">
                </div>
                <div class="grupo-input">
                    <label>Tipo de Mídia</label>
                    <select id="jogo-midia">
                        <option value="Digital">Digital</option>
                        <option value="Física">Física</option>
                    </select>
                </div>
                <div class="grupo-input">
                    <label>Gênero</label>
                    <input
                        type="text"
                        id="jogo-genero"
                        required
                        placeholder="Ex: RPG, Estratégia">
                </div>
                <div class="grupo-input">
                    <label>Desenvolvedora</label>
                    <input
                        type="text"
                        id="jogo-desenvolvedora"
                        required
                        placeholder="Ex: Valve, Capcom">
                </div>
                <button type="submit" class="btn-form">Catalogar Título</button>
            </form>
        </div>
    </div>

    <script>
        const usuarioId = localStorage.getItem('usuarioId');
        let jogoEditandoId = null;
        if (!usuarioId) {
            window.location.href = 'index.html';
        }

        function controlarModalJogo(acao) {
            const modal = document.getElementById('modal-jogo');
            if (acao === 'abrir') {
                modal.classList.add('aberto');
            } else {
                modal.classList.remove('aberto');
                jogoEditandoId = null;
                document.getElementById('form-jogo').reset();
            }
        }

        function abrirModalJogo() {
            const idColecao = localStorage.getItem('colecaoSelecionada');
            if (!idColecao) {
                alert('Nenhuma coleção selecionada.');
                return;
            }
            controlarModalJogo('abrir');
        }

        function aplicarMascaraData(input) {
            let valor = input.value.replace(/\D/g, "");
            if (valor.length >= 3 && valor.length <= 4) {
                valor = valor.replace(/^(\d{2})(\d+)/, "$1/$2");
            } else if (valor.length >= 5) {
                valor = valor.replace(/^(\d{2})(\d{2})(\d+)/, "$1/$2/$3");
            }
            input.value = valor;
        }

        // Algoritmo dinâmico de pesquisa na tabela (Filtro em tempo real)
        function filtrarTabela(busca) {
            const termo = busca.toLowerCase();
            const linhas = document.querySelectorAll("#tabela-jogos-id tbody tr");
            
            linhas.forEach(linha => {
                const titulo = linha.querySelector(".celula-titulo").textContent.toLowerCase();
                if (titulo.includes(termo)) {
                    linha.style.display = "";
                } else {
                    linha.style.display = "none";
                }
            });
        }

        const idColecao = localStorage.getItem('colecaoSelecionada');

        if (!idColecao) {
            window.location.href = 'colecoes.html';
        }

        carregarJogos();

        async function carregarJogos() {

            const tabela = document.getElementById('lista-jogos');
            const mensagem = document.getElementById('mensagem-sem-jogos');

            try {
                const resposta = await fetch(
                    `http://localhost:8080/api/jogos/colecao/${idColecao}`
                );

                const jogos = await resposta.json();

                tabela.innerHTML = '';

                if (jogos.length === 0) {
                    mensagem.style.display = 'block';
                    return;
                }

                mensagem.style.display = 'none';

                jogos.forEach(jogo => {

                    tabela.innerHTML += `
                        <tr>
                            <td><div class="capa-miniatura">Capa</div></td>
                            <td class="celula-titulo">${jogo.nome}</td>
                            <td>${jogo.dataLancamento || '-'}</td>
                            <td>${jogo.tipoMidia || '-'}</td>
                            <td>${jogo.genero || '-'}</td>
                            <td>${jogo.desenvolvedora?.nome ?? 'Independente'}</td>
                            <td>
                                <button
                                    class="btn-acao btn-editar"
                                    onclick="editarJogo(${jogo.id})">
                                    Editar
                                </button>

                                <button
                                    class="btn-acao btn-deletar"
                                    onclick="excluirJogo(${jogo.id})">
                                    Deletar
                                </button>
                            </td>
                        </tr>
                    `;
                });

            } catch (erro) {
                console.error(erro);
                alert('Erro ao carregar jogos.');
            }
        }

        async function salvarJogo(event) {

            event.preventDefault();

            const payload = {
                nome: document.getElementById('jogo-nome').value,
                dataLancamento: document.getElementById('jogo-data').value,
                genero: document.getElementById('jogo-genero').value,
                tipoMidia: document.getElementById('jogo-midia').value,
                idColecao: Number(idColecao),
                desenvolvedora: {
                    nome: document.getElementById('jogo-desenvolvedora').value
                }
            };

            if (jogoEditandoId) {
                payload.id = jogoEditandoId;
            }

            try {

                const url = jogoEditandoId
                    ? `http://localhost:8080/api/jogos/${jogoEditandoId}`
                    : 'http://localhost:8080/api/jogos';

                const metodo = jogoEditandoId ? 'PUT' : 'POST';

                const resposta = await fetch(
                    url,
                    {
                        method: metodo,
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    }
                );

                const dados = await resposta.json();

                if (!resposta.ok) {
                    alert(dados.erro || 'Erro ao cadastrar jogo.');
                    return;
                }

                document.getElementById('form-jogo').reset();

                jogoEditandoId = null;

                controlarModalJogo('fechar');

                carregarJogos();

            } catch (erro) {
                console.error(erro);
                alert('Erro ao conectar ao servidor.');
            }
        }

        async function excluirJogo(id) {

            const confirmar = confirm(
                'Deseja realmente excluir este jogo?'
            );

            if (!confirmar) {
                return;
            }

            try {

                const resposta = await fetch(
                    `http://localhost:8080/api/jogos/${id}`,
                    {
                        method: 'DELETE'
                    }
                );

                const dados = await resposta.json();

                if (!resposta.ok) {
                    alert(dados.erro || 'Erro ao excluir jogo.');
                    return;
                }

                alert(dados.mensagem);

                carregarJogos();

            } catch (erro) {

                console.error(erro);

                alert('Erro ao conectar ao servidor.');
            }
        }

        async function editarJogo(id) {

            const linhas = await fetch(
                `http://localhost:8080/api/jogos/colecao/${idColecao}`
            );

            const jogos = await linhas.json();

            const jogo = jogos.find(j => j.id === id);

            if (!jogo) {
                alert('Jogo não encontrado.');
                return;
            }

            jogoEditandoId = id;

            document.getElementById('jogo-nome').value = jogo.nome || '';
            document.getElementById('jogo-data').value = jogo.dataLancamento || '';
            document.getElementById('jogo-genero').value = jogo.genero || '';
            document.getElementById('jogo-midia').value = jogo.tipoMidia || 'Digital';
            document.getElementById('jogo-desenvolvedora').value =
            jogo.desenvolvedora?.nome || '';

            controlarModalJogo('abrir');
        }
    </script>
</body>
</html>
